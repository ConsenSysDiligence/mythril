name: Release to Docker Hub

on:
  push:
    branches: [develop]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Determine image target
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "target=myth" >> "$GITHUB_OUTPUT"
            echo "name=mythril/myth" >> "$GITHUB_OUTPUT"
          else
            echo "target=myth-dev" >> "$GITHUB_OUTPUT"
            echo "name=mythril/myth-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Run smoke tests
        run: docker buildx bake myth-smoke-test

      - name: Build and push
        run: docker buildx bake --push ${{ steps.meta.outputs.target }}
        env:
          VERSION: ${{ github.ref_type == 'tag' && format('{0},latest', github.ref_name) || github.sha }}

      - name: Trivy scan
        if: github.ref_type == 'tag'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.name }}:${{ github.ref_name }}
          severity: CRITICAL,HIGH
          exit-code: "0"
